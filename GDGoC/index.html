<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adraka</title>
</head>
<body>
    <div>
        <h1>Hello World</h1>
        <h2>Hello World</h2>
        <h3>Hello World</h3>
        <h4>Hello World</h4>
        <h5>Hello World</h5>
        <h6>Hello World</h6>
    </div>
    
    <div> <!-- div adalah pembungkus konten --> 
        <br><br> <!-- cara mudah enter banyak dengan cara " br*(jumlah enter) ""  --> 
        <p>Hai, Aku <b>bold</b></p>
        <p>Hai, Aku <i>italic</i></p>
        <p>Hai, Aku <q>quote</q></p>
        <p>Hai, Aku <s>stroke</s></p>
    </div>

    <div> 
        <br>
        <p>ABCDEFGHIJKLMNOPQRSTUVWXYZ</p>
    </div>
